<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedAuto — Panel Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<link href="https://fonts.bunny.net/css?family=plus-jakarta-sans:400,500,600,700,800,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;-webkit-font-smoothing:antialiased}
#root{min-height:100%}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
</style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:14px">Cargando panel...</div></div>
<script>
window.onerror=function(msg,src,line,col,err){
  document.getElementById('root').innerHTML='<div style="padding:30px;font-family:monospace;background:#fef2f2;color:#dc2626;font-size:13px;white-space:pre-wrap"><strong>ERROR:</strong>\n'+msg+'\nLinea: '+line+'\n'+(err?err.stack:'')+'</div>';
};
</script>
<script type="text/babel">
const {useState, useMemo} = React;

// ── DATA INICIAL ─────────────────────────────────────────────────────────────
const INIT_AGENCIES = [
  {id:"a1", name:"AutoCenter Norte", owner:"Carlos Mendez", email:"carlos@autocenter.com", city:"Yerba Buena", plan:"premium", status:"activo", ops:0, rating:1, joined:"2024-01-15", color:"#6366f1", premiumExpiry:"2026-03-12"},
  {id:"a2", name:"Garage del Sur",   owner:"Roberto Diaz",  email:"roberto@garage.com",    city:"Villa Urquiza", plan:"free", status:"activo", ops:0, rating:1, joined:"2024-03-10", color:"#0ea5e9"},
  {id:"a3", name:"Premium Motors",   owner:"Ana Gimenez",   email:"ana@premiummotors.com", city:"Centro",        plan:"premium", status:"activo", ops:0, rating:1, joined:"2024-02-20", color:"#10b981", premiumExpiry:"2026-04-01"},
  {id:"a4", name:"MotorMax Tucuman", owner:"Diego Romero",  email:"diego@motormax.com",    city:"San Miguel",    plan:"premium", status:"activo", ops:0, rating:1, joined:"2024-04-05", color:"#f59e0b", premiumExpiry:"2026-03-20"},
  {id:"a5", name:"Autos del Norte",  owner:"Marcela Suarez",email:"marcela@autosnorte.com",city:"Banda del Rio Sali", plan:"free", status:"activo", ops:0, rating:1, joined:"2024-05-18", color:"#ec4899"},
  {id:"a6", name:"Concesionaria Ruta",owner:"Pablo Herrera",email:"pablo@ruta.com",        city:"Yerba Buena",   plan:"premium", status:"activo", ops:0, rating:1, joined:"2024-01-22", color:"#8b5cf6", premiumExpiry:"2026-03-25"},
  {id:"a7", name:"Motorshow",        owner:"Marcos Villafuerte",email:"motorshow@demo.com",city:"San Miguel de Tucuman", plan:"free", status:"activo", ops:0, rating:1, joined:"2025-06-01", color:"#e11d48"},
];

const INIT_CODES = [
  {code:"REDAUTO-2025-A1", used:false, usedBy:null, note:"Para AutoCenter Este",   created:"2025-01-10"},
  {code:"REDAUTO-2025-B2", used:false, usedBy:null, note:"Para Garage Centro",     created:"2025-01-10"},
  {code:"REDAUTO-2025-C3", used:false, usedBy:null, note:"Para concesionario nuevo", created:"2025-01-10"},
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function Avatar({name, color, size=36}) {
  return (
    <div style={{width:size,height:size,borderRadius:size/3.5,background:color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:size*0.38,flexShrink:0}}>
      {name[0].toUpperCase()}
    </div>
  );
}

function Badge({label, type}) {
  const styles = {
    premium: {background:"#ede9fe", color:"#7c3aed"},
    free:    {background:"#f1f5f9", color:"#64748b"},
    activo:  {background:"#dcfce7", color:"#16a34a"},
    bloqueado:{background:"#fee2e2",color:"#dc2626"},
    usado:   {background:"#f1f5f9", color:"#94a3b8"},
    activo_code:{background:"#dcfce7",color:"#16a34a"},
  };
  const s = styles[type] || styles.free;
  return (
    <span style={{...s, fontSize:10, fontWeight:800, padding:"3px 9px", borderRadius:20, letterSpacing:.3, whiteSpace:"nowrap"}}>
      {label.toUpperCase()}
    </span>
  );
}

function StatCard({label, value, sub, color}) {
  return (
    <div style={{background:"#fff",borderRadius:16,padding:"20px 24px",border:"1px solid #e2e8f0",flex:1,minWidth:140}}>
      <p style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>{label}</p>
      <p style={{fontSize:32,fontWeight:900,color:color||"#0f172a",lineHeight:1}}>{value}</p>
      {sub && <p style={{fontSize:12,color:"#64748b",marginTop:6}}>{sub}</p>}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("concesionarias");
  const [agencies, setAgencies] = useState(INIT_AGENCIES);
  const [codes, setCodes] = useState(INIT_CODES);
  const [search, setSearch] = useState("");
  const [filterPlan, setFilterPlan] = useState("todos");
  const [filterStatus, setFilterStatus] = useState("todos");
  const [modal, setModal] = useState(null); // {type:"edit"|"newcode", data}
  const [newCodeNote, setNewCodeNote] = useState("");
  const [editData, setEditData] = useState(null);
  const [copied, setCopied] = useState(null);
  const [requests, setRequests] = useState([
    {id:"req1", agencyName:"Motorshow", ownerName:"Marcos Villafuerte", email:"motorshow@demo.com", city:"San Miguel de Tucuman", date:"2025-03-07", status:"pendiente"},
  ]);

  // Stats
  const total = agencies.length;
  const premium = agencies.filter(a=>a.plan==="premium").length;
  const free = agencies.filter(a=>a.plan==="free").length;
  const bloqueados = agencies.filter(a=>a.status==="bloqueado").length;
  const codesActivos = codes.filter(c=>!c.used).length;

  // Filtered agencies
  const filtered = useMemo(()=>agencies.filter(a=>{
    const q = search.toLowerCase();
    const matchSearch = !q || a.name.toLowerCase().includes(q) || a.owner.toLowerCase().includes(q) || a.city.toLowerCase().includes(q) || a.email.toLowerCase().includes(q);
    const matchPlan = filterPlan==="todos" || a.plan===filterPlan;
    const matchStatus = filterStatus==="todos" || a.status===filterStatus;
    return matchSearch && matchPlan && matchStatus;
  }), [agencies, search, filterPlan, filterStatus]);

  function toggleBlock(id) {
    setAgencies(p=>p.map(a=>a.id===id?{...a,status:a.status==="activo"?"bloqueado":"activo"}:a));
  }

  function changePlan(id, plan) {
    setAgencies(p=>p.map(a=>a.id===id?{...a,plan}:a));
  }

  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const rand = Array.from({length:8},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
    return "RA-"+rand;
  }

  function addCode(e) {
    e.preventDefault();
    if(!newCodeNote.trim()) return;
    const c = {code:generateCode(), used:false, usedBy:null, note:newCodeNote.trim(), created:new Date().toISOString().slice(0,10)};
    setCodes(p=>[c,...p]);
    setNewCodeNote("");
  }

  function copyCode(code) {
    navigator.clipboard.writeText(code).catch(()=>{});
    setCopied(code);
    setTimeout(()=>setCopied(null), 2000);
  }

  function deleteCode(code) {
    setCodes(p=>p.filter(c=>c.code!==code));
  }

  function approveRequest(id){
    const req = requests.find(r=>r.id===id);
    if(!req) return;
    const expiry = new Date();
    expiry.setMonth(expiry.getMonth()+1);
    const expiryStr = expiry.toISOString().slice(0,10);
    setRequests(p=>p.map(r=>r.id===id?{...r,status:"aprobado"}:r));
    setAgencies(p=>p.map(a=>a.name===req.agencyName?{...a,plan:"premium",premiumExpiry:expiryStr}:a));
  }
  function rejectRequest(id){
    setRequests(p=>p.map(r=>r.id===id?{...r,status:"rechazado"}:r));
  }
  const inp = {width:"100%",padding:"11px 14px",fontSize:13,border:"1.5px solid #e2e8f0",borderRadius:10,background:"#fff",fontFamily:"inherit",color:"#0f172a",outline:"none"};
  const nav = [{id:"concesionarias",label:"Concesionarias",icon:"🏢"},{id:"solicitudes",label:"Solicitudes",icon:"🔔"},{id:"codigos",label:"Códigos",icon:"🔑"},{id:"estadisticas",label:"Estadísticas",icon:"📊"}];

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",flexDirection:"column"}}>

      {/* TOPBAR */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 28px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#2563eb,#4f46e5)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#fff",fontSize:16}}>🚗</span>
          </div>
          <div>
            <span style={{fontWeight:900,fontSize:15,color:"#0f172a"}}>RedAuto</span>
            <span style={{fontSize:11,color:"#94a3b8",marginLeft:8,fontWeight:600}}>Panel Admin</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)}
              style={{padding:"7px 16px",borderRadius:9,border:"1.5px solid",borderColor:tab===n.id?"#2563eb":"transparent",background:tab===n.id?"#eff6ff":"transparent",color:tab===n.id?"#2563eb":"#64748b",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
              <span>{n.icon}</span>{n.label}{n.id==="solicitudes"&&requests.filter(r=>r.status==="pendiente").length>0&&(
                <span style={{background:"#ef4444",color:"#fff",fontSize:10,fontWeight:800,borderRadius:99,padding:"1px 6px",marginLeft:2}}>
                  {requests.filter(r=>r.status==="pendiente").length}
                </span>
              )}
            </button>
          ))}
        </div>
        <div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>
          {new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}
        </div>
      </div>

      <div style={{padding:"28px 28px",maxWidth:1200,margin:"0 auto",width:"100%"}}>

        {/* ── CONCESIONARIAS ── */}
        {tab==="concesionarias" && (
          <div>
            <div style={{marginBottom:24}}>
              <h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>Concesionarias</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:3}}>Gestioná los accesos, planes y estado de cada agencia en la red.</p>
            </div>

            {/* Stats row */}
            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              <StatCard label="Vencen esta semana" value={agencies.filter(a=>{if(a.plan!=="premium"||!a.premiumExpiry)return false;const d=new Date(a.premiumExpiry),t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/(1000*60*60*24))<=7;}).length} sub="Premium por vencer" color="#d97706"/>
              <StatCard label="Total en la red" value={total} sub="concesionarias registradas"/>
              <StatCard label="Plan Premium" value={premium} sub="con acceso completo" color="#7c3aed"/>
              <StatCard label="Plan Gratis" value={free} sub="con acceso básico" color="#64748b"/>
              <StatCard label="Bloqueadas" value={bloqueados} sub="sin acceso activo" color="#dc2626"/>
            </div>

            {/* Filters */}
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Buscar por nombre, dueño, ciudad, email..."
                style={{...inp, flex:1, minWidth:220}}/>
              <select value={filterPlan} onChange={e=>setFilterPlan(e.target.value)} style={{...inp,width:"auto",paddingRight:32}}>
                <option value="todos">Todos los planes</option>
                <option value="premium">Premium</option>
                <option value="free">Gratis</option>
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{...inp,width:"auto",paddingRight:32}}>
                <option value="todos">Todos los estados</option>
                <option value="activo">Activos</option>
                <option value="bloqueado">Bloqueados</option>
              </select>
            </div>

            {/* Table */}
            <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                    {["Concesionaria","Ciudad","Contacto","Registro","Plan","Vencimiento","Estado","Calificación","Acciones"].map(h=>(
                      <th key={h} style={{padding:"12px 16px",fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.8,textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((a,i)=>(
                    <tr key={a.id} style={{borderBottom:"1px solid #f1f5f9",background:a.status==="bloqueado"?"#fefefe":"#fff",opacity:a.status==="bloqueado"?.6:1,transition:"background .15s"}}>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <Avatar name={a.name} color={a.color} size={36}/>
                          <div>
                            <p style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{a.name}</p>
                            <p style={{fontSize:11,color:"#94a3b8"}}>{a.owner}</p>
                          </div>
                        </div>
                      </td>
                      <td style={{padding:"14px 16px",fontSize:13,color:"#475569"}}>{a.city}</td>
                      <td style={{padding:"14px 16px"}}>
                        <p style={{fontSize:12,color:"#475569"}}>{a.email}</p>
                      </td>
                      <td style={{padding:"14px 16px",fontSize:12,color:"#94a3b8",whiteSpace:"nowrap"}}>{a.joined}</td>
                      <td style={{padding:"14px 16px"}}>
                        <select value={a.plan}
                          onChange={e=>changePlan(a.id,e.target.value)}
                          style={{padding:"5px 10px",borderRadius:8,border:"1.5px solid",borderColor:a.plan==="premium"?"#c4b5fd":"#e2e8f0",background:a.plan==="premium"?"#ede9fe":"#f8fafc",color:a.plan==="premium"?"#7c3aed":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",outline:"none"}}>
                          <option value="free">Gratis</option>
                          <option value="premium">Premium</option>
                        </select>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        {a.plan==="premium"&&a.premiumExpiry?(()=>{
                          const d=new Date(a.premiumExpiry),t=new Date();t.setHours(0,0,0,0);
                          const days=Math.ceil((d-t)/(1000*60*60*24));
                          return <span style={{fontSize:12,fontWeight:700,color:days<=7?"#dc2626":days<=14?"#d97706":"#16a34a"}}>{a.premiumExpiry} <span style={{fontSize:10,color:days<=7?"#dc2626":"#94a3b8"}}>({days}d)</span></span>;
                        })():<span style={{fontSize:12,color:"#94a3b8"}}>—</span>}
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <Badge label={a.status} type={a.status}/>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{color:"#f59e0b",fontSize:13}}>★</span>
                          <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{a.rating}</span>
                          <span style={{fontSize:11,color:"#94a3b8",marginLeft:2}}>({a.ops} ops)</span>
                        </div>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <button onClick={()=>toggleBlock(a.id)}
                          style={{padding:"6px 14px",borderRadius:8,border:"1.5px solid",borderColor:a.status==="activo"?"#fecaca":"#bbf7d0",background:a.status==="activo"?"#fff1f2":"#f0fdf4",color:a.status==="activo"?"#dc2626":"#16a34a",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                          {a.status==="activo"?"🔒 Bloquear":"🔓 Desbloquear"}
                        </button>
                      </td>
                    </tr>
                  ))}
                  {filtered.length===0&&(
                    <tr><td colSpan={8} style={{padding:"40px",textAlign:"center",color:"#94a3b8",fontSize:14}}>No se encontraron concesionarias</td></tr>
                  )}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:12,color:"#94a3b8",marginTop:10}}>{filtered.length} de {total} concesionarias</p>
          </div>
        )}

        {/* ── CÓDIGOS ── */}
        {tab==="codigos" && (
          <div>
            <div style={{marginBottom:24}}>
              <h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>Códigos de invitación</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:3}}>Generá y gestioná los códigos que enviás a nuevas concesionarias para registrarse.</p>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              <StatCard label="Códigos activos" value={codesActivos} sub="disponibles para usar" color="#16a34a"/>
              <StatCard label="Códigos usados" value={codes.filter(c=>c.used).length} sub="ya canjeados"/>
              <StatCard label="Total generados" value={codes.length} sub="desde el inicio"/>
            </div>

            {/* Generar nuevo */}
            <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:24,marginBottom:20}}>
              <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:14}}>Generar nuevo código</h3>
              <form onSubmit={addCode} style={{display:"flex",gap:10}}>
                <input value={newCodeNote} onChange={e=>setNewCodeNote(e.target.value)}
                  placeholder="Para quién es este código (ej: Garage Norte - San Miguel)"
                  style={{...inp,flex:1}}/>
                <button type="submit"
                  style={{padding:"11px 24px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                  + Generar código
                </button>
              </form>
            </div>

            {/* Lista códigos */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {codes.map((c,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:14,border:"1.5px solid",borderColor:c.used?"#e2e8f0":"#bbf7d0",padding:"16px 20px",display:"flex",alignItems:"center",gap:16,opacity:c.used?.7:1}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                      <span style={{fontFamily:"monospace",fontWeight:800,fontSize:15,color:c.used?"#94a3b8":"#0f172a",letterSpacing:1}}>{c.code}</span>
                      <Badge label={c.used?"Usado":"Activo"} type={c.used?"usado":"activo_code"}/>
                    </div>
                    <p style={{fontSize:12,color:"#64748b"}}>{c.note}</p>
                    {c.usedBy&&<p style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Usado por: {c.usedBy}</p>}
                  </div>
                  <p style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{c.created}</p>
                  {!c.used && (
                    <button onClick={()=>copyCode(c.code)}
                      style={{padding:"7px 14px",borderRadius:9,border:"1.5px solid #bfdbfe",background:copied===c.code?"#dcfce7":"#eff6ff",color:copied===c.code?"#16a34a":"#2563eb",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s",whiteSpace:"nowrap"}}>
                      {copied===c.code?"✓ Copiado":"📋 Copiar"}
                    </button>
                  )}
                  {!c.used && (
                    <button onClick={()=>deleteCode(c.code)}
                      style={{padding:"7px 14px",borderRadius:9,border:"1.5px solid #fecaca",background:"#fff1f2",color:"#dc2626",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      🗑 Eliminar
                    </button>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── SOLICITUDES ── */}
        {tab==="solicitudes" && (
          <div>
            <div style={{marginBottom:24}}>
              <h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>Solicitudes de Premium</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:3}}>Concesionarias que solicitaron pasar al plan Premium. Aprobá o rechazá desde acá.</p>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              <StatCard label="Pendientes" value={requests.filter(r=>r.status==="pendiente").length} sub="esperando revisión" color="#d97706"/>
              <StatCard label="Aprobadas" value={requests.filter(r=>r.status==="aprobado").length} sub="activadas como Premium" color="#16a34a"/>
              <StatCard label="Rechazadas" value={requests.filter(r=>r.status==="rechazado").length} sub="no aprobadas" color="#dc2626"/>
            </div>

            {requests.length===0 ? (
              <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:"60px 40px",textAlign:"center"}}>
                <p style={{fontSize:32,marginBottom:12}}>🔔</p>
                <p style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>Sin solicitudes por ahora</p>
                <p style={{fontSize:13,color:"#94a3b8",marginTop:4}}>Cuando una concesionaria solicite Premium, aparece acá.</p>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {requests.map(r=>(
                  <div key={r.id} style={{background:"#fff",borderRadius:16,border:"1.5px solid",borderColor:r.status==="pendiente"?"#fde68a":r.status==="aprobado"?"#bbf7d0":"#fecaca",padding:"20px 24px",display:"flex",alignItems:"center",gap:16}}>
                    <div style={{width:44,height:44,borderRadius:12,background:r.status==="pendiente"?"#fffbeb":r.status==="aprobado"?"#f0fdf4":"#fff1f2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                      {r.status==="pendiente"?"⏳":r.status==="aprobado"?"✅":"❌"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                        <p style={{fontSize:15,fontWeight:800,color:"#0f172a"}}>{r.agencyName}</p>
                        <Badge label={r.status} type={r.status==="pendiente"?"usado":r.status==="aprobado"?"activo_code":"usado"}/>
                      </div>
                      <p style={{fontSize:13,color:"#475569"}}>{r.ownerName} · {r.city}</p>
                      <p style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{r.email}</p>
                    </div>
                    <div style={{textAlign:"right",marginRight:16}}>
                      <p style={{fontSize:11,color:"#94a3b8"}}>Solicitado el</p>
                      <p style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{r.date}</p>
                    </div>
                    {r.status==="pendiente" && (
                      <div style={{display:"flex",gap:8,flexShrink:0}}>
                        <button onClick={()=>rejectRequest(r.id)}
                          style={{padding:"9px 18px",borderRadius:10,border:"1.5px solid #fecaca",background:"#fff1f2",color:"#dc2626",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                          ✕ Rechazar
                        </button>
                        <button onClick={()=>approveRequest(r.id)}
                          style={{padding:"9px 18px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                          ✓ Aprobar Premium
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── ESTADÍSTICAS ── */}}
        {tab==="estadisticas" && (
          <div>
            <div style={{marginBottom:24}}>
              <h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>Estadísticas de la red</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:3}}>Resumen general del estado y actividad de RedAuto.</p>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              <StatCard label="Concesionarias" value={total} sub="en la red" color="#2563eb"/>
              <StatCard label="Premium" value={premium} sub={`${Math.round(premium/total*100)}% del total`} color="#7c3aed"/>
              <StatCard label="Gratis" value={free} sub={`${Math.round(free/total*100)}% del total`} color="#64748b"/>
              <StatCard label="Bloqueadas" value={bloqueados} sub="sin acceso" color="#dc2626"/>
            </div>

            {/* Plan distribution */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:24}}>
                <h3 style={{fontSize:14,fontWeight:800,marginBottom:16}}>Distribución por plan</h3>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#7c3aed"}}>Premium</span>
                      <span style={{fontSize:13,fontWeight:700}}>{premium} ({Math.round(premium/total*100)}%)</span>
                    </div>
                    <div style={{height:10,background:"#f1f5f9",borderRadius:99}}>
                      <div style={{height:"100%",width:`${premium/total*100}%`,background:"linear-gradient(90deg,#7c3aed,#a78bfa)",borderRadius:99,transition:"width .5s"}}/>
                    </div>
                  </div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>Gratis</span>
                      <span style={{fontSize:13,fontWeight:700}}>{free} ({Math.round(free/total*100)}%)</span>
                    </div>
                    <div style={{height:10,background:"#f1f5f9",borderRadius:99}}>
                      <div style={{height:"100%",width:`${free/total*100}%`,background:"linear-gradient(90deg,#94a3b8,#cbd5e1)",borderRadius:99,transition:"width .5s"}}/>
                    </div>
                  </div>
                </div>
              </div>

              <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:24}}>
                <h3 style={{fontSize:14,fontWeight:800,marginBottom:16}}>Concesionarias por ciudad</h3>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {Object.entries(agencies.reduce((acc,a)=>{acc[a.city]=(acc[a.city]||0)+1;return acc;},{}))
                    .sort((a,b)=>b[1]-a[1])
                    .map(([city,count])=>(
                      <div key={city} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:13,color:"#475569"}}>{city}</span>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{height:6,width:count*20,background:"#bfdbfe",borderRadius:99}}/>
                          <span style={{fontSize:13,fontWeight:700,color:"#0f172a",minWidth:16}}>{count}</span>
                        </div>
                      </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Agencies ranking */}
            <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:24}}>
              <h3 style={{fontSize:14,fontWeight:800,marginBottom:16}}>Ranking de concesionarias</h3>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[...agencies].sort((a,b)=>b.rating-a.rating||b.ops-a.ops).map((a,i)=>(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 14px",borderRadius:10,background:i===0?"#fffbeb":"#f8fafc"}}>
                    <span style={{fontSize:16,fontWeight:900,color:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#cbd5e1",minWidth:24,textAlign:"center"}}>
                      {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}
                    </span>
                    <Avatar name={a.name} color={a.color} size={32}/>
                    <div style={{flex:1}}>
                      <p style={{fontSize:13,fontWeight:700}}>{a.name}</p>
                      <p style={{fontSize:11,color:"#94a3b8"}}>{a.city}</p>
                    </div>
                    <Badge label={a.plan} type={a.plan}/>
                    <div style={{textAlign:"right"}}>
                      <p style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>★ {a.rating}</p>
                      <p style={{fontSize:11,color:"#94a3b8"}}>{a.ops} operaciones</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
