  const othersStock=NET_STOCK.filter(s=>!stock.find(m=>m.id===s.id));
  const matchedSearches=searches.map(s=>{
    const hit=othersStock.find(n=>n.brand.toLowerCase()===s.brand.toLowerCase()&&n.model.toLowerCase().includes(s.model.toLowerCase())&&n.status==="available");
    return {...s,hit};
  });
  const activeMatches=matchedSearches.filter(s=>s.hit);

  function getAgency(agencyId){return agencies.find(a=>a.id===agencyId);}

  function tryConnect(item){
    if(me.plan==="premium"){setConnectModal(item);return;} if(me.credits<=0){setGateItem(item);setBuyModal(true);return;}
    setMe(p=>({...p,credits:p.credits-1}));
    setConnectModal(item);
  }

  function doBuyCredits(){
    setBuyModal(false);
    setTimeout(()=>{
      setMpStep("select");
      setMpModal(true);
    }, 80);
  }

  function doConfirmPayment(){
    setMpModal(false);
    setMe(p=>({...p,credits:p.credits+buyQty}));
    setBuyModal(false);
    if(gateItem){
      const item=gateItem;setGateItem(null);
      setTimeout(()=>{setMe(p=>({...p,credits:p.credits-1}));setConnectModal(item);},80);
    } else setGateItem(null);
  }

  function doUpgrade(){setMe(p=>({...p,plan:"pro",credits:p.credits+PLAN_BY_ID("pro").credits}));}

  function doAddStock(e){
    e.preventDefault();
    if(isFree&&stock.length>=3) return;
    setStock(p=>[...p,{...ns,id:"s"+Date.now(),status:"available",year:+ns.year,price:+ns.price,km:+ns.km,commission:parseFloat(ns.commission)}]);
    setNs({brand:"",model:"",year:"",price:"",km:"",fuel:"Diesel",color:"",commission:2,desc:""});
    setModalStock(false);
  }

  function doAddSearch(e){
    e.preventDefault();
    setSearches(p=>[...p,{...nq,id:"q"+Date.now(),yearFrom:+nq.yearFrom,yearTo:+nq.yearTo,budget:+nq.budget}]);
    setNq({brand:"",model:"",yearFrom:"",yearTo:"",budget:"",payment:"Contado"});
    setModalSearch(false);
  }

  function uploadLogo(e,agencyId){
    const file=e.target.files[0];if(!file) return;
    const r=new FileReader();
    r.onload=ev=>setAgencies(p=>p.map(a=>a.id===agencyId?{...a,logo:ev.target.result}:a));
    r.readAsDataURL(file);
  }

  const NAV=[
    {id:"dashboard",icon:"dashboard",label:"Dashboard"},
    {id:"network",icon:"hub",label:"Red de Concesionarios"},
    {id:"stock",icon:"directions_car",label:"Mi Stock de Vehiculos",badge:stock.length||null,badgeBg:"#2563eb"},
    {id:"searches",icon:"manage_search",label:"Mis Busquedas",badge:searches.length||null,badgeBg:"#2563eb"},
    {id:"matches",icon:"bolt",label:"Matches Activos",badge:activeMatches.length||null,badgeBg:"#f59e0b",glow:activeMatches.length>0},
    {id:"operations",icon:"receipt_long",label:"Mis Operaciones",badge:isFree?null:(ops.length||null),badgeBg:"#2563eb"},
    {id:"plans",icon:"workspace_premium",label:"Plan y Precios",accent:"#7c3aed"},
  ];

  return (
    <div style={{display:"flex",height:"100vh",background:"#f0f2f5",overflow:"hidden"}}>
      <style>{CSS}</style>
      {/* SIDEBAR */}
      <aside style={{width:244,background:"#fff",borderRight:"1px solid #e2e8f0",display:"flex",flexDirection:"column",flexShrink:0,zIndex:10}}>
        <div style={{padding:"18px 16px 14px",borderBottom:"1px solid #f1f5f9"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,background:"linear-gradient(135deg,#2563eb,#4f46e5)",borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(37,99,235,.25)"}}>
              <Icon n="directions_car" size={21} color="#fff"/>
            </div>
            <div>
              <p style={{fontWeight:900,fontSize:15,letterSpacing:"-.3px",color:"#0f172a"}}>RedAuto</p>
              <p style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>Red Multimarca - Tucuman</p>
            </div>
          </div>
        </div>
        <div style={{padding:"12px 12px 6px"}}>
          <div style={{background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:11,padding:"10px 12px",display:"flex",gap:9,alignItems:"center"}}>
            <div className="av" style={{width:34,height:34,background:me.color,borderRadius:9,fontSize:13,flexShrink:0}}>{me.agency[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:12,fontWeight:700,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{me.agency}</p>
              <p style={{fontSize:10,color:"#64748b"}}>{me.name}</p>
            </div>
            <span style={{padding:"2px 7px",borderRadius:6,background:isFree?"#f3f4f6":"#ede9fe",color:isFree?"#6b7280":"#7c3aed",fontSize:9,fontWeight:800,letterSpacing:.3}}>{plan.name.toUpperCase()}</span>
          </div>
        </div>
        <nav style={{flex:1,padding:"4px 8px",overflowY:"auto"}}>
          <p className="stitle" style={{padding:"8px 6px 6px"}}>Menu principal</p>
          {NAV.map(n=>(
            <button key={n.id} className={"nav-item"+(tab===n.id?" active":"")}
              onClick={()=>setTab(n.id)}
              style={n.accent&&tab!==n.id?{color:n.accent}:{}}>
              <Icon n={n.icon} size={18} color={tab===n.id?"#2563eb":n.accent&&tab!==n.id?n.accent:n.glow?"#f59e0b":undefined}/>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge&&<span style={{background:n.badgeBg,color:"#fff",borderRadius:20,fontSize:10,fontWeight:700,padding:"2px 7px"}}>{n.badge}</span>}
              {n.accent&&<Icon n="chevron_right" size={13} color={n.accent}/>}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px 12px 14px",borderTop:"1px solid #f1f5f9"}}>
          {isFree?(
            <div style={{background:"#fef9f0",border:"1.5px solid #fde68a",borderRadius:10,padding:"10px 13px",marginBottom:8}}>
              <p style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:4}}>PLAN GRATIS</p>
              <p style={{fontSize:11,color:"#78350f",lineHeight:1.5,marginBottom:8}}>Ver contactos cuesta <strong>{fmt(plan.creditPrice)}</strong> por match. Max 3 autos.</p>
              <button className="btn btn-p" style={{width:"100%",justifyContent:"center",fontSize:11,padding:"6px 10px"}} onClick={()=>setTab("plans")}>
                <Icon n="workspace_premium" size={13} color="#fff"/>Ver Plan Premium
              </button>
            </div>
          ):(
            <div style={{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:10,padding:"10px 13px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <p style={{fontSize:10,fontWeight:800,color:"#6d28d9"}}>PLAN PREMIUM</p>
                <Icon n="workspace_premium" size={16} color="#7c3aed"/>
              </div>
              <p style={{fontSize:11,color:"#5b21b6",lineHeight:1.5,marginBottom:6}}>Matches <strong>ilimitados</strong> y busqueda inversa activa.</p>
              <div style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                <p style={{fontSize:11,fontWeight:700,color:"#fff"}}>Contactos siempre visibles</p>
              </div>
            </div>
          )}
          <button className="btn btn-g" style={{width:"100%",justifyContent:"center",fontSize:12,color:"#ef4444",padding:"8px"}} onClick={onLogout}>
            <Icon n="logout" size={14} color="#ef4444"/>Cerrar sesion
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{height:58,background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 28px",flexShrink:0}}>
          <div>
            <h1 style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>{(NAV.find(n=>n.id===tab)||{label:"Panel"}).label}</h1>
            <p style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{me.agency} - {new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {tab==="stock"&&<button className="btn btn-p" onClick={()=>setModalStock(true)}><Icon n="add" size={16} color="#fff"/>Publicar vehiculo</button>}
            {tab==="searches"&&<button className="btn btn-p" onClick={()=>setModalSearch(true)}><Icon n="add" size={16} color="#fff"/>Nueva busqueda</button>}
            {tab==="dashboard"&&<>
              <button className="btn btn-o" onClick={()=>setModalSearch(true)}><Icon n="manage_search" size={15}/>Buscar auto</button>
              <button className="btn btn-p" onClick={()=>setModalStock(true)}><Icon n="add" size={16} color="#fff"/>Publicar auto</button>
            </>}
            <div className="av" style={{width:32,height:32,background:me.color,borderRadius:9,fontSize:12,cursor:"pointer"}}>{me.name[0]}</div>
          </div>
        </header>

        <div className="scr" style={{flex:1,padding:"24px 28px"}}>

          {/* DASHBOARD */}
          {tab==="dashboard"&&(
            <div className="fu" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:28}}>
              <div style={{textAlign:"center"}}>
                <div style={{width:70,height:70,background:"linear-gradient(135deg,#eff6ff,#dbeafe)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",border:"2px solid #bfdbfe"}}>
                  <Icon n="dashboard" size={34} color="#2563eb"/>
                </div>
                <h2 style={{fontSize:24,fontWeight:900,color:"#0f172a",letterSpacing:"-.3px",marginBottom:8}}>Hola, {me.name.split(" ")[0]}!</h2>
                <p style={{fontSize:14,color:"#64748b",lineHeight:1.7,maxWidth:420,margin:"0 auto"}}>Tu panel esta listo. Usa el menu de la izquierda para navegar entre las secciones.</p>
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
                {[
                  {icon:"directions_car",label:"Vehiculos publicados",value:stock.length,bg:"#eff6ff",ic:"#2563eb",go:"stock"},
                  {icon:"manage_search",label:"Busquedas activas",value:searches.length,bg:"#f0fdf4",ic:"#16a34a",go:"searches"},
                  {icon:"bolt",label:"Matches activos",value:activeMatches.length,bg:"#fef3c7",ic:"#d97706",go:"matches",glow:activeMatches.length>0},
                  {icon:"receipt_long",label:"Operaciones cerradas",value:isFree?"Bloqueado":ops.length,bg:"#f5f3ff",ic:"#7c3aed",go:"operations"},
                ].map((k,i)=>(
                  <div key={i} className={"card card-h"+(k.glow?" pulse-m":"")}
                    style={{padding:"18px 22px",minWidth:160,borderColor:k.glow?"#fbbf24":undefined}}
                    onClick={()=>setTab(k.go)}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{width:42,height:42,background:k.bg,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <Icon n={k.icon} size={21} color={k.ic}/>
                      </div>
                      <div>
                        <p style={{fontSize:24,fontWeight:900,lineHeight:1,color:"#0f172a"}}>{k.value}</p>
                        <p style={{fontSize:11,color:"#64748b",marginTop:4,lineHeight:1.3}}>{k.label}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {isFree&&(
                <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:16,padding:"20px 28px",color:"#fff",display:"flex",gap:20,alignItems:"center",maxWidth:520,boxShadow:"0 8px 32px rgba(37,99,235,.25)"}}>
                  <Icon n="workspace_premium" size={34} color="#fbbf24" style={{flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:800,fontSize:15,marginBottom:4}}>Estas en el plan Gratis</p>
                    <p style={{fontSize:12,opacity:.85,lineHeight:1.65}}>Abrir un match cuesta {fmt(plan.creditPrice)}. Con el plan Premium pagas $100.000/mes, acceso ilimitado y busqueda inversa activada.</p>
                  </div>
                  <button className="btn" style={{background:"#fbbf24",color:"#1e3a8a",fontWeight:700,padding:"9px 16px",flexShrink:0,whiteSpace:"nowrap"}} onClick={()=>setTab("plans")}>Ver planes</button>
                </div>
              )}
            </div>
          )}

          {/* RED DE CONCESIONARIOS */}
          {tab==="network"&&(
            <div className="fu">
              <p style={{fontSize:13,color:"#64748b",marginBottom:18}}><strong style={{color:"#0f172a"}}>{agencies.length}</strong> concesionarias activas en la red</p>
              <div className="card" style={{overflow:"hidden"}}>
                <div className="thead" style={{gridTemplateColumns:"2.2fr 1.5fr 1fr 1fr 1fr 110px"}}>
                  {["Concesionaria","Ciudad","Plan","Operaciones","Calificacion","Logo"].map(h=>(
                    <p key={h} className="stitle">{h}</p>
                  ))}
                </div>
                {agencies.map(ag=>(
                  <div key={ag.id} className="trow" style={{gridTemplateColumns:"2.2fr 1.5fr 1fr 1fr 1fr 110px",gap:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:42,height:42,borderRadius:11,overflow:"hidden",background:ag.logo?"transparent":ag.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1px solid #e2e8f0"}}>
                        {ag.logo?<img src={ag.logo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{color:"#fff",fontWeight:800,fontSize:16}}>{ag.name[0]}</span>}
                      </div>
                      <div>
                        <p style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{ag.name}</p>
                        <p style={{fontSize:11,color:"#64748b"}}>{ag.owner} - Desde {ag.joined}</p>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}><Icon n="location_on" size={13} color="#94a3b8"/><p style={{fontSize:12,color:"#475569"}}>{ag.city}</p></div>
                    <Chip bg={ag.plan==="pro"?"#dbeafe":"#f3f4f6"} color={ag.plan==="pro"?"#1d4ed8":"#6b7280"} icon={ag.plan==="pro"?"rocket_launch":"storefront"}>{ag.plan==="pro"?"Pro":"Gratis"}</Chip>
                    <div style={{display:"flex",alignItems:"center",gap:5}}><Icon n="handshake" size={13} color="#16a34a"/><p style={{fontSize:12,fontWeight:700,color:"#16a34a"}}>{ag.ops}</p></div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}><Icon n="star" size={13} color="#f59e0b"/><p style={{fontSize:12,fontWeight:700}}>{ag.rating}</p></div>
                    <div>
                      <input type="file" accept="image/*" id={"lg-"+ag.id} style={{display:"none"}} onChange={e=>uploadLogo(e,ag.id)}/>
                      <label htmlFor={"lg-"+ag.id}
                        style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 11px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:600,color:"#64748b",transition:"all .13s"}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor="#93c5fd";e.currentTarget.style.color="#2563eb";e.currentTarget.style.background="#eff6ff";}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.color="#64748b";e.currentTarget.style.background="#f8fafc";}}>
                        <Icon n={ag.logo?"swap_horiz":"upload"} size={13}/>{ag.logo?"Cambiar":"Subir logo"}
                      </label>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* MI STOCK */}
          {tab==="stock"&&(
            <div className="fu">
              {isFree&&(
                <div style={{background:"#fef9f0",border:"1.5px solid #fde68a",borderRadius:12,padding:"11px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{display:"flex",gap:9,alignItems:"center"}}>
                    <Icon n="info" size={17} color="#d97706"/>
                    <p style={{fontSize:13,color:"#92400e"}}><strong>Plan Gratis:</strong> publicas hasta 3 vehiculos. Usando {stock.length} de 3.</p>
                  </div>
                  <button className="btn btn-p" style={{fontSize:12,padding:"7px 14px",flexShrink:0}} onClick={()=>setTab("plans")}>
                    <Icon n="rocket_launch" size={13} color="#fff"/>Ver planes
                  </button>
                </div>
              )}
              {stock.length===0?(
                <div className="card" style={{padding:72,textAlign:"center"}}>
                  <Icon n="directions_car" size={52} color="#e2e8f0"/>
                  <p style={{fontWeight:800,fontSize:17,marginTop:14,color:"#374151"}}>Sin vehiculos publicados</p>
                  <p style={{fontSize:13,color:"#94a3b8",marginTop:6,marginBottom:20}}>Publica tus autos para que toda la red los vea</p>
                  <button className="btn btn-p" onClick={()=>setModalStock(true)}><Icon n="add" size={16} color="#fff"/>Publicar primer vehiculo</button>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
                  {stock.map(car=>(
                    <div key={car.id} className="card card-h" style={{padding:18,borderLeft:"3px solid "+SC[car.status]}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <div style={{width:44,height:44,background:"#f1f5f9",borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="directions_car" size={22} color="#64748b"/></div>
                          <div><p style={{fontSize:14,fontWeight:800,color:"#0f172a"}}>{car.brand} {car.model}</p><p style={{fontSize:12,color:"#64748b"}}>{car.year}</p></div>
                        </div>
                        <Chip bg={SBG[car.status]} color={SC[car.status]}>{SL[car.status]}</Chip>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
                        {[{i:"speed",v:car.km.toLocaleString()+" km"},{i:"local_gas_station",v:car.fuel},{i:"palette",v:car.color}].map((d,j)=>(
                          <div key={j} style={{background:"#f8fafc",borderRadius:8,padding:"5px 8px",display:"flex",alignItems:"center",gap:4}}>
                            <Icon n={d.i} size={12} color="#94a3b8"/><span style={{fontSize:11,color:"#475569"}}>{d.v}</span>
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid #f1f5f9",paddingTop:10}}>
                        <p style={{fontSize:18,fontWeight:900,color:"#0f172a"}}>{fmt(car.price)}</p>
                        <Chip bg="#f0fdf4" color="#16a34a" icon="percent">Comision {car.commission}%</Chip>
                      </div>
                      {car.desc&&<p style={{fontSize:12,color:"#64748b",marginTop:8,lineHeight:1.6}}>{car.desc}</p>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* MIS BUSQUEDAS */}
          {tab==="searches"&&(
            <div className="fu">
              {searches.length===0?(
                <div className="card" style={{padding:72,textAlign:"center"}}>
                  <Icon n="manage_search" size={52} color="#e2e8f0"/>
                  <p style={{fontWeight:800,fontSize:17,marginTop:14,color:"#374151"}}>Sin busquedas activas</p>
                  <p style={{fontSize:13,color:"#94a3b8",marginTop:6,marginBottom:20}}>Carga que auto busca tu cliente y el sistema lo cruza con toda la red</p>
                  <button className="btn btn-p" onClick={()=>setModalSearch(true)}><Icon n="add" size={16} color="#fff"/>Nueva busqueda</button>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
                  {matchedSearches.map(s=>(
                    <div key={s.id} className="card" style={{padding:18,borderLeft:s.hit?"3px solid #2563eb":"3px solid #e2e8f0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                        <div>
                          <p style={{fontSize:15,fontWeight:800,color:"#0f172a"}}>{s.brand} {s.model}</p>
                          <p style={{fontSize:12,color:"#64748b",marginTop:2}}>{s.yearFrom}-{s.yearTo} - hasta {fmtK(s.budget)}</p>
                        </div>
                        <Chip bg="#f1f5f9" color="#475569" icon="payments">{s.payment}</Chip>
                      </div>
                      {s.hit?(
                        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:12}}>
                          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                            <Icon n="bolt" size={14} color="#2563eb"/>
                            <p style={{fontSize:12,fontWeight:700,color:"#1d4ed8"}}>Match encontrado en la red!</p>
                          </div>
                          <p style={{fontSize:12,color:"#374151"}}>{s.hit.brand} {s.hit.model} {s.hit.year} - {fmt(s.hit.price)}</p>
                          <p style={{fontSize:11,color:"#64748b",marginTop:2,marginBottom:10}}>Comision {s.hit.commission}% = {fmt(s.hit.price*s.hit.commission/100)}</p>
                          {isFree?(
                            <div className="locked" onClick={()=>{setGateItem(s.hit);setBuyModal(true);}}>
                              <Icon n="lock" size={14} color="#d97706"/>
                              <span style={{fontSize:12,color:"#92400e",fontWeight:600}}>+54 381 4xx-xxxx</span>
                              <span style={{fontSize:11,color:"#d97706",marginLeft:4}}>Ver - {fmt(plan.creditPrice)}</span>
                            </div>
                          ):(
                            <button className="btn btn-p" style={{width:"100%",justifyContent:"center",fontSize:12,padding:"8px"}} onClick={()=>tryConnect(s.hit)}>
                              <Icon n="link" size={14} color="#fff"/>{me.plan==="premium"?"Ver contacto":"Ver contacto - 1 credito"}
                            </button>
                          )}
                        </div>
                      ):(
                        <div style={{background:"#f8fafc",borderRadius:9,padding:"9px 12px",display:"flex",gap:6,alignItems:"center"}}>
                          <Icon n="hourglass_empty" size={14} color="#94a3b8"/>
                          <p style={{fontSize:12,color:"#94a3b8"}}>Buscando coincidencias en la red...</p>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* MATCHES ACTIVOS */}
          {tab==="matches"&&(

                </button>
              </div>
              {isFree&&<button className="btn btn-g" style={{width:"100%",justifyContent:"center",marginTop:8,fontSize:12}} onClick={()=>{setBuyModal(false);setGateItem(null);setTab("plans");}}>
                O mejor: ver planes con suscripcion
              </button>}
            </div>
          </div>
        </div>
      )}

      {/* MODAL CONEXION EXITOSA */}
      {connectModal&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&setConnectModal(null)}>
          <div className="modal-box fu" style={{maxWidth:390}}>
            <div style={{padding:28,textAlign:"center"}}>
              <div style={{width:66,height:66,background:"#fef3c7",borderRadius:"50%",margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="bolt" size={32} color="#d97706"/></div>
              <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Conexion establecida!</h3>
              <p style={{fontSize:13,color:"#94a3b8",marginBottom:20}}>Se desconto 1 Credito de Conexion</p>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:13,padding:16,textAlign:"left",marginBottom:14}}>
                <p style={{fontSize:14,fontWeight:700,marginBottom:10}}>{connectModal.brand} {connectModal.model} {connectModal.year}</p>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}><Icon n="sell" size={13} color="#94a3b8"/><p style={{fontSize:12,color:"#64748b"}}>Precio</p></div>
                  <p style={{fontSize:12,fontWeight:700}}>{fmt(connectModal.price)}</p>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}><Icon n="percent" size={13} color="#94a3b8"/><p style={{fontSize:12,color:"#64748b"}}>Comision</p></div>
                  <p style={{fontSize:12,fontWeight:700}}>{connectModal.commission}% = {fmt(connectModal.price*connectModal.commission/100)}</p>
                </div>
                <div style={{paddingTop:10,borderTop:"1px solid #f1f5f9"}}>
                  <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Telefono desbloqueado:</p>
                  <div style={{display:"flex",alignItems:"center",gap:8,background:"#f0fdf4",borderRadius:9,padding:"10px 13px"}}>
                    <Icon n="phone" size={17} color="#16a34a"/>
                    <p style={{fontSize:16,fontWeight:900,color:"#16a34a"}}>+54 381 455-6200</p>
                  </div>
                </div>
              </div>
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",gap:7,alignItems:"center",textAlign:"left"}}>
                <Icon n="verified_user" size={14} color="#d97706" style={{flexShrink:0}}/>
                <p style={{fontSize:11,color:"#92400e",lineHeight:1.5}}>Acuerdo de comision registrado. Solo valido si la operacion se cierra dentro de RedAuto.</p>
              </div>
              <a
                href={"https://wa.me/5493814556200?text=Hola!%20Te%20contacto%20desde%20RedAuto%20por%20el%20"+encodeURIComponent((connectModal.brand||"")+" "+(connectModal.model||"")+" "+(connectModal.year||""))}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  display:"flex",alignItems:"center",justifyContent:"center",gap:9,
                  width:"100%",padding:"13px",marginBottom:10,
                  background:"#25d366",color:"#fff",
                  border:"none",borderRadius:11,cursor:"pointer",
                  fontFamily:"inherit",fontWeight:700,fontSize:15,
                  textDecoration:"none",
                  boxShadow:"0 4px 14px rgba(37,211,102,.35)",
                  transition:"all .15s"
                }}
                onMouseEnter={e=>{e.currentTarget.style.background="#1ebe59";e.currentTarget.style.transform="translateY(-1px)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="#25d366";e.currentTarget.style.transform="";}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Abrir WhatsApp
              </a>
              <button style={{width:"100%",padding:"11px",background:"#f1f5f9",color:"#475569",border:"none",borderRadius:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:14}} onClick={()=>setConnectModal(null)}>
                Entendido
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL PUBLICAR VEHICULO */}
      {modalStock&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&setModalStock(false)}>
          <div className="modal-box fu" style={{maxWidth:500}}>
            <div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:34,height:34,background:"#eff6ff",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="directions_car" size={17} color="#2563eb"/></div>
                <h3 style={{fontSize:15,fontWeight:700}}>Publicar vehiculo</h3>
              </div>
              <button className="btn btn-g" style={{padding:"5px 8px"}} onClick={()=>setModalStock(false)}><Icon n="close" size={18}/></button>
            </div>
            <form onSubmit={doAddStock} style={{padding:24,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Marca</label><input className="inp" value={ns.brand} onChange={e=>setNs(p=>({...p,brand:e.target.value}))} required/></div>
                <div><label className="lbl">Modelo</label><input className="inp" value={ns.model} onChange={e=>setNs(p=>({...p,model:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <div><label className="lbl">Anio</label><input className="inp" type="number" value={ns.year} onChange={e=>setNs(p=>({...p,year:e.target.value}))} required/></div>
                <div><label className="lbl">Kilometraje</label><input className="inp" type="number" value={ns.km} onChange={e=>setNs(p=>({...p,km:e.target.value}))} required/></div>
                <div><label className="lbl">Color</label><input className="inp" value={ns.color} onChange={e=>setNs(p=>({...p,color:e.target.value}))}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Precio (ARS)</label><input className="inp" type="number" value={ns.price} onChange={e=>setNs(p=>({...p,price:e.target.value}))} required/></div>
                <div><label className="lbl">Combustible</label><select className="inp" value={ns.fuel} onChange={e=>setNs(p=>({...p,fuel:e.target.value}))}><option>Diesel</option><option>Nafta</option><option>GNC</option><option>Hibrido</option></select></div>
              </div>
              <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:11,padding:13}}>
                <label className="lbl" style={{color:"#1d4ed8",fontSize:13,display:"flex",alignItems:"center",gap:5,marginBottom:8}}>
                  <Icon n="handshake" size={15} color="#2563eb"/>Comision que ofreces si un colega trae al comprador
                </label>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="inp" type="number" min="0.5" max="5" step="0.5" value={ns.commission} onChange={e=>setNs(p=>({...p,commission:e.target.value}))} style={{width:80}} required/>
                  <span style={{fontWeight:900,color:"#2563eb",fontSize:22}}>%</span>
                  {ns.price&&<span style={{fontSize:13,color:"#60a5fa",fontWeight:600}}>= {fmt(+ns.price*+ns.commission/100)}</span>}
                </div>
              </div>
              <div><label className="lbl">Descripcion</label><textarea className="inp" rows={3} value={ns.desc} onChange={e=>setNs(p=>({...p,desc:e.target.value}))}/></div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button type="button" className="btn btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>setModalStock(false)}>Cancelar</button>
                <button type="submit" className="btn btn-p" style={{flex:2,justifyContent:"center",fontSize:14,padding:11}}><Icon n="publish" size={16} color="#fff"/>Publicar en la Red</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* MODAL NUEVA BUSQUEDA */}
      {modalSearch&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&setModalSearch(false)}>
          <div className="modal-box fu" style={{maxWidth:450}}>
            <div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:34,height:34,background:"#f0fdf4",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="manage_search" size={17} color="#16a34a"/></div>
                <h3 style={{fontSize:15,fontWeight:700}}>Nueva busqueda</h3>
              </div>
              <button className="btn btn-g" style={{padding:"5px 8px"}} onClick={()=>setModalSearch(false)}><Icon n="close" size={18}/></button>
            </div>
            <form onSubmit={doAddSearch} style={{padding:24,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:9,padding:"9px 13px",display:"flex",gap:8,alignItems:"center"}}>
                <Icon n="bolt" size={14} color="#16a34a"/>
                <p style={{fontSize:12,color:"#166534",fontWeight:600}}>El sistema cruza tus datos al instante con todo el stock de la red.</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Marca</label><input className="inp" value={nq.brand} onChange={e=>setNq(p=>({...p,brand:e.target.value}))} required/></div>
                <div><label className="lbl">Modelo</label><input className="inp" value={nq.model} onChange={e=>setNq(p=>({...p,model:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Anio desde</label><input className="inp" type="number" value={nq.yearFrom} onChange={e=>setNq(p=>({...p,yearFrom:e.target.value}))} required/></div>
                <div><label className="lbl">Anio hasta</label><input className="inp" type="number" value={nq.yearTo} onChange={e=>setNq(p=>({...p,yearTo:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Presupuesto max (ARS)</label><input className="inp" type="number" value={nq.budget} onChange={e=>setNq(p=>({...p,budget:e.target.value}))} required/></div>
                <div><label className="lbl">Forma de pago</label><select className="inp" value={nq.payment} onChange={e=>setNq(p=>({...p,payment:e.target.value}))}><option>Contado</option><option>Financiado</option><option>Permuta parcial</option></select></div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button type="button" className="btn btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>setModalSearch(false)}>Cancelar</button>
                <button type="submit" className="btn btn-p" style={{flex:2,justifyContent:"center",fontSize:14,padding:11}}><Icon n="search" size={16} color="#fff"/>Buscar en la Red</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* MODAL MERCADO PAGO */}
      {mpModal&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&(setMpModal(false),setMpStep("select"))}>
          <div className="modal-box fu" style={{maxWidth:400}}>
            {mpStep==="select"&&(
              <div style={{padding:28}}>
                {/* header */}
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
                  <div style={{width:48,height:48,borderRadius:12,overflow:"hidden",flexShrink:0,background:"#009ee3",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                      <rect width="48" height="48" rx="10" fill="#009ee3"/>
                      <path d="M8 24c0-3.5 2.5-6.5 6-7.5l18-5c4-1 8 1.5 9 5.5s-1.5 8-5.5 9l-18 5C13.5 32.5 9 30 8 26c0-.7 0-1.3 0-2z" fill="white" opacity=".3"/>
                      <path d="M12 26c0-2.2 1.8-4 4-4h16c2.2 0 4 1.8 4 4s-1.8 4-4 4H16c-2.2 0-4-1.8-4-4z" fill="white"/>
                    </svg>
                  </div>
                  <div>
                    <p style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>Pagar con Mercado Pago</p>
                    <p style={{fontSize:12,color:"#64748b"}}>{buyQty} credito{buyQty>1?"s":""} · {fmt(50000*buyQty)}</p>
                  </div>
                  <button onClick={()=>{setMpModal(false);setMpStep("select");}} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",padding:4,display:"flex"}}>
                    <Icon n="close" size={20} color="#94a3b8"/>
                  </button>
                </div>

                {/* resumen */}
                <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:20}}>
                  <p style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Resumen de compra</p>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <p style={{fontSize:13,color:"#475569"}}>Creditos de Conexion x{buyQty}</p>
                    <p style={{fontSize:13,fontWeight:700}}>{fmt(50000*buyQty)}</p>
                  </div>
                  {gateItem&&(
                    <div style={{borderTop:"1px solid #f1f5f9",paddingTop:8,marginTop:8}}>
                      <p style={{fontSize:11,color:"#64748b"}}>Para desbloquear:</p>
                      <p style={{fontSize:12,fontWeight:600,color:"#0f172a",marginTop:2}}>{gateItem.brand} {gateItem.model} {gateItem.year}</p>
                      <p style={{fontSize:11,color:"#16a34a",fontWeight:600}}>Comision posible: {fmt(gateItem.price*gateItem.commission/100)}</p>
                    </div>
                  )}
                </div>

                {/* metodos */}
                <p style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:10}}>Selecciona metodo de pago</p>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                  {[
                    {icon:"credit_card", label:"Tarjeta de credito / debito", sub:"Visa, Mastercard, American Express"},
                    {icon:"account_balance", label:"Transferencia bancaria", sub:"CVU / CBU instantaneo"},
                    {icon:"toll", label:"Saldo en Mercado Pago", sub:"Disponible al instante"},
                  ].map((m,i)=>(
                    <div key={i}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",border:"1.5px solid #e2e8f0",borderRadius:11,cursor:"pointer",background:"#fff",transition:"all .14s"}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="#009ee3";e.currentTarget.style.background="#f0faff";}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#fff";}}
                      onClick={()=>setMpStep("processing")}>
                      <div style={{width:36,height:36,background:"#e0f2fe",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <Icon n={m.icon} size={18} color="#0284c7"/>
                      </div>
                      <div style={{flex:1}}>
                        <p style={{fontSize:13,fontWeight:600,color:"#0f172a"}}>{m.label}</p>
                        <p style={{fontSize:11,color:"#94a3b8"}}>{m.sub}</p>
                      </div>
                      <Icon n="chevron_right" size={16} color="#94a3b8"/>
                    </div>
                  ))}
                </div>

                <button onClick={()=>{setMpModal(false);setMpStep("select");}}
                  style={{width:"100%",padding:"11px",background:"#f1f5f9",color:"#475569",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>
                  Cancelar
                </button>
              </div>
            )}

            {mpStep==="processing"&&(
              <div style={{padding:40,textAlign:"center"}}>
                <div style={{width:72,height:72,background:"#e0f2fe",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
                  <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="10" fill="#009ee3"/>
                    <path d="M12 26c0-2.2 1.8-4 4-4h16c2.2 0 4 1.8 4 4s-1.8 4-4 4H16c-2.2 0-4-1.8-4-4z" fill="white"/>
                  </svg>
                </div>
                <p style={{fontSize:17,fontWeight:800,color:"#0f172a",marginBottom:6}}>Procesando pago...</p>
                <p style={{fontSize:13,color:"#64748b",marginBottom:28}}>Conectando con Mercado Pago</p>
                <div style={{height:6,background:"#f1f5f9",borderRadius:10,overflow:"hidden",marginBottom:28}}>
                  <div style={{height:"100%",width:"70%",background:"linear-gradient(90deg,#009ee3,#00c8ff)",borderRadius:10,animation:"shimmerBar 1.2s ease infinite"}}/>
                </div>
                <style>{`@keyframes shimmerBar{0%{width:20%}50%{width:80%}100%{width:20%}}`}</style>
                <button
                  onClick={doConfirmPayment}
                  style={{width:"100%",padding:"13px",background:"#009ee3",color:"#fff",border:"none",borderRadius:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:15,boxShadow:"0 4px 14px rgba(0,158,227,.35)"}}>
                  Simular pago aprobado ✓
                </button>
                <p style={{fontSize:11,color:"#94a3b8",marginTop:10}}>Demo — en produccion redirige a Mercado Pago</p>
              </div>
            )}
          </div>
        </div>
      )}

    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  return user ? <Dashboard user={user} onLogout={()=>setUser(null)}/> : <Login onLogin={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
