function Icon({n,size=20,color,style:st={}}) {
  const d = SVGS[n];
  if (!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color||"currentColor"} style={{flexShrink:0,display:"inline-block",...st}}>
      <path d={d}/>
    </svg>
  );
}
function Chip({children,bg="#f1f5f9",color="#64748b",icon}) {
  return <span className="chip" style={{background:bg,color}}>{icon&&<Icon n={icon} size={12}/>}{children}</span>;
}

/* LOGIN */
function Login({onLogin}) {
  const [mode, setMode] = useState("login"); // "login" | "register" | "admin"
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [showP, setShowP] = useState(false);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  // Register fields
  const [inviteCode, setInviteCode] = useState("");
  const [regAgency, setRegAgency] = useState("");
  const [regOwner, setRegOwner] = useState("");
  const [regCity, setRegCity] = useState("");
  const [regEmail, setRegEmail] = useState("");
  const [regPass, setRegPass] = useState("");

  // Admin state
  const [codes, setCodes] = useState(INVITE_CODES);
  const [users, setUsers] = useState(USERS);
  const [newCodeNote, setNewCodeNote] = useState("");
  const [adminTab, setAdminTab] = useState("codes");

  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const rand = Array.from({length:8}, ()=>chars[Math.floor(Math.random()*chars.length)]).join("");
    return "RA-" + rand;
  }

  function submitLogin(e) {
    e.preventDefault(); setErr(""); setBusy(true);
    setTimeout(()=>{
      // Check admin
      if(email===ADMIN.email && pass===ADMIN.password){ setMode("admin"); setBusy(false); return; }
      const u = users.find(u=>u.email===email && u.password===pass);
      if(u) onLogin(u);
      else { setErr("Email o contraseña incorrectos."); setBusy(false); }
    },500);
  }

  function submitRegister(e) {
    e.preventDefault(); setErr(""); setBusy(true);
    setTimeout(()=>{
      const codeEntry = codes.find(c=>c.code===inviteCode.trim().toUpperCase() && !c.used);
      if(!codeEntry){ setErr("Código inválido o ya utilizado. Contactá al administrador."); setBusy(false); return; }
      // Mark code as used
      setCodes(prev=>prev.map(c=>c.code===codeEntry.code?{...c,used:true}:c));
      // Create new user
      const colors = ["#6366f1","#0ea5e9","#10b981","#f59e0b","#ec4899","#8b5cf6","#e11d48","#0284c7"];
      const newUser = {
        id:"u"+Date.now(), email:regEmail, password:regPass,
        name:regOwner, agency:regAgency, city:regCity,
        plan:"free", credits:0, rating:1, ops:0,
        color:colors[Math.floor(Math.random()*colors.length)]
      };
      setUsers(prev=>[...prev, newUser]);
      onLogin(newUser);
    },600);
  }

  const field = {width:"100%",padding:"13px 16px",fontSize:14,border:"2px solid #e2e8f0",borderRadius:12,background:"#fff",color:"#0f172a",fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
  const btn = {width:"100%",padding:"14px",fontSize:15,fontWeight:700,background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"inherit"};

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#dbeafe 0%,#eff6ff 40%,#e0e7ff 100%)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"48px 24px",overflowY:"auto",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      <div style={{position:"fixed",top:-180,right:-180,width:500,height:500,background:"radial-gradient(circle,rgba(37,99,235,.15),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:-150,left:-150,width:460,height:460,background:"radial-gradient(circle,rgba(99,102,241,.12),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:440,position:"relative",zIndex:1}}>

        {/* LOGO */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,background:"linear-gradient(135deg,#2563eb,#4f46e5)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",boxShadow:"0 8px 24px rgba(37,99,235,.3)"}}>
            <Icon n="directions_car" size={28} color="#fff"/>
          </div>
          <h1 style={{fontSize:26,fontWeight:900,color:"#0f172a",letterSpacing:"-.5px",marginBottom:6}}>RedAuto</h1>
          <p style={{fontSize:13,color:"#64748b"}}>Red Multimarca · Tucumán</p>
        </div>

        {/* ADMIN PANEL */}
        {mode==="admin" ? (
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 60px rgba(0,0,0,.1)",padding:28}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:16,fontWeight:900,color:"#0f172a"}}>Panel Admin</h2>
              <button onClick={()=>setMode("login")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#64748b"}}>← Salir</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {["codes","users"].map(t=>(
                <button key={t} onClick={()=>setAdminTab(t)}
                  style={{flex:1,padding:"8px",borderRadius:9,border:"1.5px solid",borderColor:adminTab===t?"#2563eb":"#e2e8f0",background:adminTab===t?"#eff6ff":"#fff",fontWeight:600,fontSize:12,cursor:"pointer",color:adminTab===t?"#2563eb":"#64748b",fontFamily:"inherit"}}>
                  {t==="codes"?"Códigos":"Usuarios"}
                </button>
              ))}
            </div>

            {adminTab==="codes" && (
              <div>
                <div style={{display:"flex",gap:8,marginBottom:16}}>
                  <input value={newCodeNote} onChange={e=>setNewCodeNote(e.target.value)}
                    placeholder="Nota (ej: para Garage Norte)"
                    style={{...field,padding:"10px 12px",fontSize:13,flex:1}}/>
                  <button onClick={()=>{
                    if(!newCodeNote.trim()) return;
                    setCodes(prev=>[...prev,{code:generateCode(),used:false,note:newCodeNote.trim()}]);
                    setNewCodeNote("");
                  }} style={{padding:"10px 16px",background:"#2563eb",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                    + Generar
                  </button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:340,overflowY:"auto"}}>
                  {codes.map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:c.used?"#f8fafc":"#f0fdf4",borderRadius:10,border:"1px solid",borderColor:c.used?"#e2e8f0":"#bbf7d0"}}>
                      <div style={{flex:1}}>
                        <p style={{fontFamily:"monospace",fontWeight:700,fontSize:13,color:c.used?"#94a3b8":"#16a34a",letterSpacing:.5}}>{c.code}</p>
                        <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{c.note}</p>
                      </div>
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:c.used?"#f1f5f9":"#dcfce7",color:c.used?"#94a3b8":"#16a34a"}}>
                        {c.used?"USADO":"ACTIVO"}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {adminTab==="users" && (
              <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:380,overflowY:"auto"}}>
                {users.map((u,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                    <div className="av" style={{width:32,height:32,background:u.color,borderRadius:8,fontSize:12,flexShrink:0}}>{u.name[0]}</div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{u.agency}</p>
                      <p style={{fontSize:11,color:"#64748b"}}>{u.email} · {u.city}</p>
                    </div>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:u.plan==="premium"?"#ede9fe":"#f1f5f9",color:u.plan==="premium"?"#7c3aed":"#6b7280"}}>
                      {u.plan.toUpperCase()}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>

        ) : mode==="login" ? (
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 60px rgba(0,0,0,.1)",padding:32}}>
            <h2 style={{fontSize:20,fontWeight:900,color:"#0f172a",marginBottom:4}}>Uní tu concesionaria a la red</h2>
            <p style={{fontSize:13,color:"#64748b",marginBottom:24}}>Ingresá con tu cuenta</p>
            <form onSubmit={submitLogin} style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:.8,textTransform:"uppercase",display:"block",marginBottom:6}}>Email</label>
                <input style={field} type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@concesionaria.com"
                  onFocus={e=>e.target.style.borderColor="#93c5fd"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:.8,textTransform:"uppercase"}}>Contraseña</label>
                  <button type="button" onClick={()=>setShowP(p=>!p)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#2563eb",fontFamily:"inherit",fontWeight:600}}>{showP?"Ocultar":"Mostrar"}</button>
                </div>
                <input style={field} type={showP?"text":"password"} required value={pass} onChange={e=>setPass(e.target.value)}
                  onFocus={e=>e.target.style.borderColor="#93c5fd"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
              </div>
              {err&&<p style={{fontSize:12,color:"#dc2626",background:"#fef2f2",padding:"8px 12px",borderRadius:8}}>{err}</p>}
              <button type="submit" style={{...btn,opacity:busy?.7:1}}>{busy?"Ingresando...":"Ingresar al panel →"}</button>
            </form>
            <div style={{textAlign:"center",marginTop:20}}>
              <p style={{fontSize:13,color:"#64748b"}}>¿Tenés un código de invitación?{" "}
                <button onClick={()=>{setMode("register");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#2563eb",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>Registrate acá</button>
              </p>
            </div>
            {/* DEMO */}
            <div style={{marginTop:24,padding:"16px",background:"#f8fafc",borderRadius:14,border:"1px solid #e8edf5"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#94a3b8",textAlign:"center",letterSpacing:1,marginBottom:12,textTransform:"uppercase"}}>Acceso rápido — Demo</p>
              {users.map(u=>(
                <button key={u.id} type="button" onClick={()=>{setEmail(u.email);setPass(u.password);}}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",width:"100%",marginBottom:6,background:"#fff",border:"1.5px solid #e8edf5",borderRadius:10,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                  <div className="av" style={{width:32,height:32,background:u.color,borderRadius:8,fontSize:12,flexShrink:0}}>{u.name[0]}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{u.agency}</p>
                    <p style={{fontSize:11,color:"#94a3b8"}}>{u.email}</p>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:u.plan==="premium"?"#ede9fe":"#f1f5f9",color:u.plan==="premium"?"#7c3aed":"#6b7280"}}>{u.plan.toUpperCase()}</span>
                </button>
              ))}
            </div>
          </div>

        ) : (
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 60px rgba(0,0,0,.1)",padding:32}}>
            <button onClick={()=>{setMode("login");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#64748b",fontFamily:"inherit",marginBottom:16,display:"flex",alignItems:"center",gap:4}}>
              ← Volver al login
            </button>
            <h2 style={{fontSize:20,fontWeight:900,color:"#0f172a",marginBottom:4}}>Registrar concesionaria</h2>
            <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Necesitás un código de invitación para acceder</p>
            <form onSubmit={submitRegister} style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"12px 14px"}}>
                <label style={{fontSize:11,fontWeight:700,color:"#16a34a",letterSpacing:.8,textTransform:"uppercase",display:"block",marginBottom:6}}>Código de invitación</label>
                <input style={{...field,borderColor:"#bbf7d0",fontFamily:"monospace",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}} required value={inviteCode} onChange={e=>setInviteCode(e.target.value)} placeholder="RA-XXXXXXXX"/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:.8,textTransform:"uppercase",display:"block",marginBottom:6}}>Nombre del concesionario</label>

function Dashboard({user,onLogout}) {
  const [tab,setTab]=useState("dashboard");
  const [me,setMe]=useState(user);
  const [agencies,setAgencies]=useState(AGENCIES);
  const [stock,setStock]=useState(STOCK0[user.id]||[]);
  const [searches,setSearches]=useState(SEARCH0[user.id]||[]);
  const [ops,setOps]=useState(OPS0[user.id]||[]);
  const [clientes,setClientes]=useState(CLIENTES0[user.id]||[]);
  const [modalCliente,setModalCliente]=useState(false);
  const [rateModal,setRateModal]=useState(null);
  const [requests,setRequests]=useState(REQUESTS0);
  const [premiumRequested,setPremiumRequested]=useState(false); // agency object
  const [rateStars,setRateStars]=useState(5);
  const [rateComment,setRateComment]=useState("");
  const [editCliente,setEditCliente]=useState(null);
  const [nc,setNc]=useState({name:"",phone:"",email:"",brand:"",model:"",yearFrom:"",yearTo:"",budget:"",payment:"Contado",notes:""});
  const [modalStock,setModalStock]=useState(false);
  const [modalSearch,setModalSearch]=useState(false);
  const [connectModal,setConnectModal]=useState(null);
  const [buyModal,setBuyModal]=useState(false);
  const [buyQty,setBuyQty]=useState(1);
  const [gateItem,setGateItem]=useState(null);
  const [mpModal,setMpModal]=useState(false);
  const [premiumModal,setPremiumModal]=useState(false);
  const [premiumStep,setPremiumStep]=useState("select"); // select | processing | approved
  const [mpStep,setMpStep]=useState("select"); // select | processing | done
  const [ns,setNs]=useState({brand:"",model:"",year:"",price:"",km:"",fuel:"Diesel",color:"",commission:2,desc:""});
  const [nq,setNq]=useState({brand:"",model:"",yearFrom:"",yearTo:"",budget:"",payment:"Contado"});

  const plan=PLAN_BY_ID(me.plan);
  const isFree=me.plan==="free";
  const [sidebarOpen,setSidebarOpen]=useState(false);

  // Premium expiry
  const _today=new Date(); _today.setHours(0,0,0,0);
  const _expiry=me.premiumExpiry?new Date(me.premiumExpiry):null;
  const daysLeft=_expiry?Math.ceil((_expiry-_today)/(1000*60*60*24)):null;
  const isExpiringSoon=!isFree&&daysLeft!==null&&daysLeft<=7&&daysLeft>0;
  const isExpired=!isFree&&daysLeft!==null&&daysLeft<=0;
  if(isExpired){setTimeout(()=>setMe(p=>({...p,plan:"free",premiumExpiry:null})),0);}
  const othersStock=NET_STOCK.filter(s=>{
    // exclude user's own stock items
    if(stock.find(m=>m.id===s.id)) return false;
    // exclude cars from user's own agency (via agencyId matching user's agency name)
    const userAgency = agencies.find(a=>a.name===me.agency);
    if(userAgency && s.agencyId===userAgency.id) return false;
    return true;
  });
  const matchedSearches=searches.map(s=>{
    const hit=othersStock.find(n=>n.brand.toLowerCase()===s.brand.toLowerCase()&&n.model.toLowerCase().includes(s.model.toLowerCase())&&n.status==="available");
    return {...s,hit};
  });
  const activeMatches=matchedSearches.filter(s=>s.hit);

  function getAgency(agencyId){return agencies.find(a=>a.id===agencyId);}

  function tryConnect(item){
    if(me.plan==="premium"){setConnectModal(item);return;} if(me.credits<=0){setGateItem(item);setBuyModal(true);return;}
    setMe(p=>({...p,credits:p.credits-1}));
    setConnectModal(item);
  }

  function doBuyCredits(){
    setBuyModal(false);
    setTimeout(()=>{
      setMpStep("select");
      setMpModal(true);
    }, 80);
  }

  function doRequestPremium(){
    if(premiumRequested || !isFree) return;
    const req = {
      id:"req"+Date.now(),
      agencyId: agencies.find(a=>a.name===me.agency)?.id || "",
      agencyName: me.agency,
      ownerName: me.name,
      email: me.email,
      city: me.city || "",
      date: new Date().toISOString().slice(0,10),
      status:"pendiente"
    };
    setRequests(p=>[req,...p]);
    setPremiumRequested(true);
  }
  function doRate(e){
    e.preventDefault();
    if(!rateModal) return;
    const review = {from:me.agency, stars:rateStars, comment:rateComment, date:new Date().toISOString().slice(0,10)};
    setAgencies(prev=>prev.map(a=>{
      if(a.id!==rateModal.id) return a;
      const newReviews = [...(a.reviews||[]), review];
      const avgRating = Math.round((newReviews.reduce((s,r)=>s+r.stars,0)/newReviews.length)*10)/10;
      return {...a, reviews:newReviews, rating:avgRating, ops:a.ops+1};
    }));
    setRateModal(null);
    setRateStars(5);
    setRateComment("");
  }
  function doAddCliente(e){
    e.preventDefault();
    const c={...nc,id:"c"+Date.now(),status:"buscando",matchAgency:null,matchCar:null,createdAt:new Date().toISOString().slice(0,10)};
    setClientes(p=>[c,...p]);

    setModalCliente(false);
  }
  function updateClienteStatus(id,status){
    setClientes(p=>p.map(c=>c.id===id?{...c,status}:c));

  }
  function doConfirmPremium(){
    setPremiumStep("processing");

        expiry.setMonth(expiry.getMonth()+1);

        setPremiumModal(false);

                      <p style={{fontSize:13,fontWeight:editCliente.status===opt.val?700:500,color:editCliente.status===opt.val?opt.color:"#374151"}}>{opt.label}</p>
                      {editCliente.status===opt.val&&<Icon n="check" size={14} color={opt.color} style={{marginLeft:"auto"}}/>}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <p className="lbl">Agencia donde se derivó</p>
                <select className="inp" value={editCliente.matchAgency||""} onChange={e=>setClientes(p=>p.map(c=>c.id===editCliente.id?{...c,matchAgency:e.target.value}:{...c}))}>
                  <option value="">Sin agencia asignada</option>
                  {agencies.filter(a=>a.name!==me.agency).map(a=>(
                    <option key={a.id} value={a.id}>{a.name} — {a.city}</option>
                  ))}
                </select>
              </div>
              <div>
                <p className="lbl">Vehículo pactado (opcional)</p>
                <input className="inp" placeholder="Ej: Toyota Hilux 2022 — $28.500.000"
                  defaultValue={editCliente.matchCar||""}
                  onChange={e=>setClientes(p=>p.map(c=>c.id===editCliente.id?{...c,matchCar:e.target.value}:c))}/>
              </div>
              <button className="btn btn-p" style={{justifyContent:"center",padding:11}} onClick={()=>setEditCliente(null)}>
                <Icon n="check" size={15} color="#fff"/>Guardar cambios
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL PUBLICAR VEHICULO */}
      {modalStock&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&setModalStock(false)}>
          <div className="modal-box fu" style={{maxWidth:500}}>
            <div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:34,height:34,background:"#eff6ff",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="directions_car" size={17} color="#2563eb"/></div>
                <h3 style={{fontSize:15,fontWeight:700}}>Publicar vehiculo</h3>
              </div>
              <button className="btn btn-g" style={{padding:"5px 8px"}} onClick={()=>setModalStock(false)}><Icon n="close" size={18}/></button>
            </div>
            <form onSubmit={doAddStock} style={{padding:24,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Marca</label><input className="inp" value={ns.brand} onChange={e=>setNs(p=>({...p,brand:e.target.value}))} required/></div>
                <div><label className="lbl">Modelo</label><input className="inp" value={ns.model} onChange={e=>setNs(p=>({...p,model:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <div><label className="lbl">Anio</label><input className="inp" type="number" value={ns.year} onChange={e=>setNs(p=>({...p,year:e.target.value}))} required/></div>
                <div><label className="lbl">Kilometraje</label><input className="inp" type="number" value={ns.km} onChange={e=>setNs(p=>({...p,km:e.target.value}))} required/></div>
                <div><label className="lbl">Color</label><input className="inp" value={ns.color} onChange={e=>setNs(p=>({...p,color:e.target.value}))}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Precio (ARS)</label><input className="inp" type="number" value={ns.price} onChange={e=>setNs(p=>({...p,price:e.target.value}))} required/></div>
                <div><label className="lbl">Combustible</label><select className="inp" value={ns.fuel} onChange={e=>setNs(p=>({...p,fuel:e.target.value}))}><option>Diesel</option><option>Nafta</option><option>GNC</option><option>Hibrido</option></select></div>
              </div>
              <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:11,padding:13}}>
                <label className="lbl" style={{color:"#1d4ed8",fontSize:13,display:"flex",alignItems:"center",gap:5,marginBottom:8}}>
                  <Icon n="handshake" size={15} color="#2563eb"/>Comision que ofreces si un colega trae al comprador
                </label>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="inp" type="number" min="0.5" max="5" step="0.5" value={ns.commission} onChange={e=>setNs(p=>({...p,commission:e.target.value}))} style={{width:80}} required/>
                  <span style={{fontWeight:900,color:"#2563eb",fontSize:22}}>%</span>
                  {ns.price&&<span style={{fontSize:13,color:"#60a5fa",fontWeight:600}}>= {fmt(+ns.price*+ns.commission/100)}</span>}
                </div>
              </div>
              <div><label className="lbl">Descripcion</label><textarea className="inp" rows={3} value={ns.desc} onChange={e=>setNs(p=>({...p,desc:e.target.value}))}/></div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button type="button" className="btn btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>setModalStock(false)}>Cancelar</button>
                <button type="submit" className="btn btn-p" style={{flex:2,justifyContent:"center",fontSize:14,padding:11}}><Icon n="publish" size={16} color="#fff"/>Publicar en la Red</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* MODAL NUEVA BUSQUEDA */}
      {modalSearch&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&setModalSearch(false)}>
          <div className="modal-box fu" style={{maxWidth:450}}>
            <div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:34,height:34,background:"#f0fdf4",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="manage_search" size={17} color="#16a34a"/></div>
                <h3 style={{fontSize:15,fontWeight:700}}>Nueva busqueda</h3>
              </div>
              <button className="btn btn-g" style={{padding:"5px 8px"}} onClick={()=>setModalSearch(false)}><Icon n="close" size={18}/></button>
            </div>
            <form onSubmit={doAddSearch} style={{padding:24,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:9,padding:"9px 13px",display:"flex",gap:8,alignItems:"center"}}>
                <Icon n="bolt" size={14} color="#16a34a"/>
                <p style={{fontSize:12,color:"#166534",fontWeight:600}}>El sistema cruza tus datos al instante con todo el stock de la red.</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Marca</label><input className="inp" value={nq.brand} onChange={e=>setNq(p=>({...p,brand:e.target.value}))} required/></div>
                <div><label className="lbl">Modelo</label><input className="inp" value={nq.model} onChange={e=>setNq(p=>({...p,model:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Anio desde</label><input className="inp" type="number" value={nq.yearFrom} onChange={e=>setNq(p=>({...p,yearFrom:e.target.value}))} required/></div>
                <div><label className="lbl">Anio hasta</label><input className="inp" type="number" value={nq.yearTo} onChange={e=>setNq(p=>({...p,yearTo:e.target.value}))} required/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label className="lbl">Presupuesto max (ARS)</label><input className="inp" type="number" value={nq.budget} onChange={e=>setNq(p=>({...p,budget:e.target.value}))} required/></div>
                <div><label className="lbl">Forma de pago</label><select className="inp" value={nq.payment} onChange={e=>setNq(p=>({...p,payment:e.target.value}))}><option>Contado</option><option>Financiado</option><option>Permuta parcial</option></select></div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button type="button" className="btn btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>setModalSearch(false)}>Cancelar</button>
                <button type="submit" className="btn btn-p" style={{flex:2,justifyContent:"center",fontSize:14,padding:11}}><Icon n="search" size={16} color="#fff"/>Buscar en la Red</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* MODAL MERCADO PAGO */}
      {mpModal&&(
        <div className="modal-bg fi" onClick={e=>e.target===e.currentTarget&&(setMpModal(false),setMpStep("select"))}>
          <div className="modal-box fu" style={{maxWidth:400}}>
            {mpStep==="select"&&(
              <div style={{padding:28}}>
                {/* header */}
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
                  <div style={{width:48,height:48,borderRadius:12,overflow:"hidden",flexShrink:0,background:"#009ee3",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                      <rect width="48" height="48" rx="10" fill="#009ee3"/>
                      <path d="M8 24c0-3.5 2.5-6.5 6-7.5l18-5c4-1 8 1.5 9 5.5s-1.5 8-5.5 9l-18 5C13.5 32.5 9 30 8 26c0-.7 0-1.3 0-2z" fill="white" opacity=".3"/>
                      <path d="M12 26c0-2.2 1.8-4 4-4h16c2.2 0 4 1.8 4 4s-1.8 4-4 4H16c-2.2 0-4-1.8-4-4z" fill="white"/>
                    </svg>
                  </div>
                  <div>
                    <p style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>Pagar con Mercado Pago</p>
                    <p style={{fontSize:12,color:"#64748b"}}>{buyQty} credito{buyQty>1?"s":""} · {fmt(50000*buyQty)}</p>
                  </div>
                  <button onClick={()=>{setMpModal(false);setMpStep("select");}} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",padding:4,display:"flex"}}>
                    <Icon n="close" size={20} color="#94a3b8"/>
                  </button>
                </div>

                {/* resumen */}
                <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:20}}>
                  <p style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Resumen de compra</p>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <p style={{fontSize:13,color:"#475569"}}>Creditos de Conexion x{buyQty}</p>
                    <p style={{fontSize:13,fontWeight:700}}>{fmt(50000*buyQty)}</p>
                  </div>
                  {gateItem&&(
                    <div style={{borderTop:"1px solid #f1f5f9",paddingTop:8,marginTop:8}}>
                      <p style={{fontSize:11,color:"#64748b"}}>Para desbloquear:</p>
                      <p style={{fontSize:12,fontWeight:600,color:"#0f172a",marginTop:2}}>{gateItem.brand} {gateItem.model} {gateItem.year}</p>
                      <p style={{fontSize:11,color:"#16a34a",fontWeight:600}}>Comision posible: {fmt(gateItem.price*gateItem.commission/100)}</p>
                    </div>
                  )}
                </div>

                {/* metodos */}
                <p style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:10}}>Selecciona metodo de pago</p>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                  {[
                    {icon:"credit_card", label:"Tarjeta de credito / debito", sub:"Visa, Mastercard, American Express"},
                    {icon:"account_balance", label:"Transferencia bancaria", sub:"CVU / CBU instantaneo"},
                    {icon:"toll", label:"Saldo en Mercado Pago", sub:"Disponible al instante"},
                  ].map((m,i)=>(
                    <div key={i}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",border:"1.5px solid #e2e8f0",borderRadius:11,cursor:"pointer",background:"#fff",transition:"all .14s"}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="#009ee3";e.currentTarget.style.background="#f0faff";}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#fff";}}
                      onClick={()=>setMpStep("processing")}>
                      <div style={{width:36,height:36,background:"#e0f2fe",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <Icon n={m.icon} size={18} color="#0284c7"/>
                      </div>
                      <div style={{flex:1}}>
                        <p style={{fontSize:13,fontWeight:600,color:"#0f172a"}}>{m.label}</p>
                        <p style={{fontSize:11,color:"#94a3b8"}}>{m.sub}</p>
                      </div>
                      <Icon n="chevron_right" size={16} color="#94a3b8"/>
                    </div>
                  ))}
                </div>

                <button onClick={()=>{setMpModal(false);setMpStep("select");}}
                  style={{width:"100%",padding:"11px",background:"#f1f5f9",color:"#475569",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>
                  Cancelar
                </button>
              </div>
            )}

            {mpStep==="processing"&&(
              <div style={{padding:40,textAlign:"center"}}>
                <div style={{width:72,height:72,background:"#e0f2fe",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
                  <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="10" fill="#009ee3"/>
                    <path d="M12 26c0-2.2 1.8-4 4-4h16c2.2 0 4 1.8 4 4s-1.8 4-4 4H16c-2.2 0-4-1.8-4-4z" fill="white"/>
                  </svg>
                </div>
                <p style={{fontSize:17,fontWeight:800,color:"#0f172a",marginBottom:6}}>Procesando pago...</p>
                <p style={{fontSize:13,color:"#64748b",marginBottom:28}}>Conectando con Mercado Pago</p>
                <div style={{height:6,background:"#f1f5f9",borderRadius:10,overflow:"hidden",marginBottom:28}}>
                  <div style={{height:"100%",width:"70%",background:"linear-gradient(90deg,#009ee3,#00c8ff)",borderRadius:10,animation:"shimmerBar 1.2s ease infinite"}}/>
                </div>
                <style>{`@keyframes shimmerBar{0%{width:20%}50%{width:80%}100%{width:20%}}`}</style>
                <button
                  onClick={doConfirmPayment}
                  style={{width:"100%",padding:"13px",background:"#009ee3",color:"#fff",border:"none",borderRadius:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:15,boxShadow:"0 4px 14px rgba(0,158,227,.35)"}}>
                  Simular pago aprobado ✓
                </button>
                <p style={{fontSize:11,color:"#94a3b8",marginTop:10}}>Demo — en produccion redirige a Mercado Pago</p>
              </div>
            )}
          </div>
        </div>
      )}

    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  return user ? <Dashboard user={user} onLogout={()=>setUser(null)}/> : <Login onLogin={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
